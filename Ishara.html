<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song List</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }

        .section-title {
            text-align: center;
            font-size: 1.2rem;
            padding: 15px 10px;
        }

        .song-list {
            width: 100%;
        }

        .song-list img {
            display: block;
            width: 100%;
            height: auto;
            border: 0;
        }
    </style>
</head>
<body>
		<br></br>
    <p class="section-title"><h1>Slow Songs for Dinner and Start</h1></p>

    <div class="song-list">
        <img src="slow1.png" alt="Slow Songs Page 1" loading="eager">
        <img src="slow2.png" alt="Slow Songs Page 2" loading="lazy">
        <img src="slow3.png" alt="Slow Songs Page 3" loading="lazy">
    </div>
		<br></br>
	    <p class="section-title"><h1>Fast Songs for the Party</h1></p>

    <div class="song-list">
        <img src="fast1.png" alt="fast1" loading="eager">
        <img src="fast2.png" alt="fast2" loading="lazy">
        <img src="fast3.png" alt="fast3" loading="lazy">
		        <img src="fast4.png" alt="fast4" loading="lazy">
				        <img src="fast5.png" alt="fast5" loading="lazy">
    </div>

		<br></br>
	    <p class="section-title"><h1>None Stop & Baila for the Dance Floor</h1></p>

    <div class="song-list">
        <img src="nonestop1.png" alt="nonestop 1" loading="eager">
        <img src="nonestop.png" alt="nonestop " loading="eager">
		<br></br>
    </div>
</body>
</html>
